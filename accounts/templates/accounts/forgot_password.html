<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | BSocial</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="form-panel" style="min-height: 100vh;">
        <div class="form-card">
            <h2>Forgot Password</h2>
            <p>Enter your email and we’ll help you recover your account.</p>
            <form method="post">
                {% csrf_token %}
                <div class="field-group">
                    <label for="id_email">Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon">✉️</span>
                        {{ form.email }}
                    </div>
                    {% if form.email.errors %}<div class="errors">{{ form.email.errors|striptags }}</div>{% endif %}
                </div>
                <button class="btn" type="submit">Send Reset Link</button>
            </form>
            <div style="margin-top: 16px;"><a class="switch-link" href="{% url 'accounts:signin' %}">Back to Sign In</a></div>
        </div>
    </div>
</body>
</html>
