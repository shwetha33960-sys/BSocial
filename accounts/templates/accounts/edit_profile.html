<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | BSocial</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 700px);
            background: white;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 20px 45px rgba(15,23,42,.12);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            color: #111827;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        label {
            font-weight: 600;
            color: #374151;
            display: block;
            margin-bottom: 6px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            border: none;
            cursor: pointer;
            padding: 12px 20px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: white;
        }

        .secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .errorlist {
            color: red;
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>Edit Profile</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="actions">
            <button class="btn" type="submit">
                Save Profile
            </button>

            <a class="btn secondary" href="{% url 'accounts:dashboard' %}">
                Cancel
            </a>
        </div>

    </form>

</div>

</body>
</html>
