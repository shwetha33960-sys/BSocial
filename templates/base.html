{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSocial</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}
    {% endblock %}
</head>

<body>

    <nav class="navbar"

        <a href="{% url 'accounts:dashboard' %}" class="logo">
            🚀 BSocial
        </a>

        <div class="search-box">
            <input
                type="text"
                placeholder="Search users... (Coming Soon)"
            >
        </div>

        <div class="nav-links">

            <a href="{% url 'accounts:dashboard' %}">
                🏠 Home
            </a>

            <a href="{% url 'accounts:edit_profile' %}">
                👤 Profile
            </a>

            <a href="{% url 'accounts:signout' %}">
                🚪 Logout
            </a>

        </div>

    </nav>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
